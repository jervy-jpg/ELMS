<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 2. Load YOUR configuration file -->
    <script src="supabaseClient.js"></script>
    <script src="signup.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>ELMS-Sign Up</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <img src="logo.jpg" alt="School Logo" class="background-logo">

    <div class="login-container">
        <div class="login-header">
            <img src="logo2.png" alt="School Logo" class="header-logo">
            <h1>Employee Leave Management System</h1>
        </div>

        <form onsubmit="handleSignup(event)">
            <label>Full Name</label>
            <input type="text" id="fullname" placeholder="Enter your full name" required>

            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>
       

            <label>Password</label>
            <input type="password" id="password" placeholder="Create password" required>

            <label>Confirm Password</label>
            <input type="password" id="confirm_password" placeholder="Confirm password" required>

            <button type="submit" class="btn-signup">Sign Up</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            Already have an account?
            <a href="login.html" style="color: #FFD700;">Login here</a>
        </p>
    </div>

</body>

</html>
